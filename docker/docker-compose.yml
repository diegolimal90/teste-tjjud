version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tjj_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tjj_db
    ports:
      - "5432:5432"
    volumes:
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
